<!DOCTYPE html>
<html>
<body>

<div style="position:fixed; bottom:20px; right:20px; width:300px; border:1px solid #ccc; padding:10px; background:white;">
  <h4>Chatbot</h4>
  <div id="chatbox" style="height:150px; overflow:auto; border:1px solid #ddd; margin-bottom:5px;"></div>

  <input id="msg" placeholder="Type message" style="width:70%;">
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const msg = document.getElementById("msg").value;
  const chatbox = document.getElementById("chatbox");

  chatbox.innerHTML += "<p><b>You:</b> " + msg + "</p>";

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({message: msg})
  });

  const data = await res.json();

  chatbox.innerHTML += "<p><b>Bot:</b> " + data.reply + "</p>";
  chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

</body>
</html>
